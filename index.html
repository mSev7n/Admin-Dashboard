<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="container">

        <div class="sidebar">
            <div class="dashLogo">
                <img src="./media/view-dashboard.svg" class="dashLogoImg">
                <h2>Dashboard</h2>
            </div>
            <ul class="tabs">
                <li>
                    <a href="#">
                        <div class="tab-list">
                            <img src="/media/home.svg" alt="" class="tabLogo">
                            <span>Home</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <div class="tab-list">
                            <img src="/media/profile.svg" alt="" class="tabLogo">
                            <span>Profile</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <div class="tab-list">
                            <img src="/media/message.svg" alt="" class="tabLogo">
                            <span>Messages</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <div class="tab-list">
                            <img src="/media/history.svg" alt="" class="tabLogo">
                            <span>History</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <div class="tab-list">
                            <img src="/media/task.svg" alt="" class="tabLogo">
                            <span>Tasks</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <div class="tab-list">
                            <img src="/media/communities.svg" alt="" class="tabLogo">
                            <span>Communities</span>
                        </div>
                    </a>
                </li>
            </ul>
            <ul class="support">
                <li>
                    <a href="#">
                        <div class="support-list">
                            <img src="/media/settings.svg" alt="" class="tabLogo">
                            <span>Settings</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <div class="support-list">
                            <img src="/media/support.svg" alt="" class="tabLogo">
                            <span>Support</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <div class="support-list">
                            <img src="/media/privacy.svg" alt="" class="tabLogo">
                            <span>Privacy</span>
                        </div>
                    </a>
                </li>
            </ul>
        </div>
        
        <div class="mainContent">
            <div class="header">
                <div class="top">
                    
                </div>
                <div class="bottom">
                    
                </div>
            </div>

            <div class="content">
                <div class="projects"></div>
                <div class="announcements"></div>
            </div>
        </div>
        
    </div>
